<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perry SFT Editor — ALFWorld</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap');

  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --accent2: #f5a623;
    --thought: #1e3a2a;
    --thought-border: #52b788;
    --action: #1d3557;
    --action-border: #457b9d;
    --user: #2d2d44;
    --user-border: #6c63ff;
    --text: #e0e0e0;
    --text-dim: #888;
    --success: #52b788;
    --danger: #e94560;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Zen Kaku Gothic New', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-family: 'Inconsolata', monospace; font-size: 16px; color: var(--accent); letter-spacing: 2px; }
  header .subtitle { font-size: 11px; color: var(--text-dim); }
  header .spacer { flex: 1; }

  .btn {
    padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer;
    font-family: 'Inconsolata', monospace; font-size: 12px; font-weight: 600; transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #c73652; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid #333; }
  .btn-secondary:hover { background: #1a4080; }
  .btn-success { background: var(--success); color: white; }
  .btn-success:hover { background: #3d8f6a; }
  .btn-danger { background: var(--danger); color: white; }
  .btn-danger:hover { background: #c0283e; }
  .btn-sm { padding: 3px 9px; font-size: 11px; }

  .layout { display: flex; height: calc(100vh - 50px); }

  /* サイドバー */
  .sidebar { width: 270px; background: var(--surface); border-right: 1px solid #2a2a4a; display: flex; flex-direction: column; flex-shrink: 0; }

  .sidebar-header {
    padding: 10px 14px;
    border-bottom: 1px solid #2a2a4a;
    font-size: 11px; color: var(--text-dim);
    letter-spacing: 1px; text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .count-badge { background: var(--accent); color: white; border-radius: 10px; padding: 1px 8px; font-size: 11px; }

  /* フィルターバー */
  .filter-bar { padding: 8px 14px; border-bottom: 1px solid #2a2a4a; flex-shrink: 0; display: flex; flex-direction: column; gap: 6px; }
  .filter-bar label { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }
  .filter-bar select {
    width: 100%; background: rgba(0,0,0,0.3); border: 1px solid #333;
    border-radius: 4px; color: var(--text); padding: 5px 8px;
    font-size: 12px; font-family: 'Zen Kaku Gothic New', sans-serif;
  }
  .filter-bar select:focus { outline: none; border-color: var(--accent); }

  .new-traj-btn {
    display: block; width: calc(100% - 28px); margin: 8px 14px;
    padding: 8px; background: rgba(233,69,96,0.1);
    border: 1px dashed var(--accent); border-radius: 6px;
    color: var(--accent); cursor: pointer; font-size: 12px;
    text-align: center; transition: all 0.15s;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    flex-shrink: 0;
  }
  .new-traj-btn:hover { background: rgba(233,69,96,0.2); }

  .traj-list { overflow-y: auto; flex: 1; }

  .trajectory-item {
    padding: 9px 14px; border-bottom: 1px solid #1f1f38;
    cursor: pointer; transition: background 0.1s;
  }
  .trajectory-item:hover { background: #1f1f38; }
  .trajectory-item.active { background: var(--surface2); border-left: 3px solid var(--accent); }
  .trajectory-item.hidden { display: none; }

  .traj-index { font-family: 'Inconsolata', monospace; font-size: 10px; color: var(--accent); margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
  .traj-preview { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .traj-turns { font-size: 10px; color: #555; margin-top: 2px; }

  /* タグバッジ */
  .tag {
    display: inline-block; padding: 1px 7px; border-radius: 8px;
    font-size: 10px; font-family: 'Inconsolata', monospace;
  }
  .tag-pick_and_place { background: rgba(82,183,136,0.25); color: #52b788; }
  .tag-pick_two { background: rgba(69,123,157,0.25); color: #457b9d; }
  .tag-clean_and_place { background: rgba(245,166,35,0.25); color: #f5a623; }
  .tag-heat_and_place { background: rgba(233,69,96,0.25); color: #e94560; }
  .tag-cool_and_place { background: rgba(108,99,255,0.25); color: #6c63ff; }
  .tag-examine { background: rgba(200,200,100,0.25); color: #c8c864; }
  .tag-db { background: rgba(150,150,200,0.25); color: #aaaadd; }
  .tag-custom { background: rgba(150,150,150,0.2); color: #aaa; }

  /* メインエリア */
  .main { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 40px; }

  .dropzone {
    border: 2px dashed #333; border-radius: 12px;
    padding: 60px 40px; text-align: center;
    transition: all 0.2s; cursor: pointer;
    margin: 40px auto; max-width: 500px;
  }
  .dropzone:hover, .dropzone.dragover { border-color: var(--accent); background: rgba(233,69,96,0.05); }
  .dropzone .icon { font-size: 48px; margin-bottom: 16px; }
  .dropzone h2 { font-size: 18px; margin-bottom: 8px; }
  .dropzone p { color: var(--text-dim); font-size: 13px; }

  .editor-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px; padding-bottom: 12px;
    border-bottom: 1px solid #2a2a4a;
  }
  .editor-header h2 { font-family: 'Inconsolata', monospace; font-size: 14px; color: var(--accent2); }
  .editor-header .spacer { flex: 1; }

  /* タグ編集エリア */
  .tag-area {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; background: rgba(0,0,0,0.2);
    border-radius: 6px; margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .tag-area-label { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }
  .tag-select {
    background: rgba(0,0,0,0.3); border: 1px solid #333;
    border-radius: 4px; color: var(--text); padding: 3px 8px;
    font-size: 11px; font-family: 'Zen Kaku Gothic New', sans-serif;
  }
  .tag-select:focus { outline: none; border-color: var(--accent); }

  /* ターンカード */
  .turn-card { margin-bottom: 7px; border-radius: 8px; overflow: hidden; border: 1px solid #2a2a4a; }
  .turn-card:hover { border-color: #3a3a5a; }

  .turn-header {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 12px; font-size: 11px;
    font-family: 'Inconsolata', monospace; letter-spacing: 1px;
  }
  .turn-card.role-user .turn-header { background: var(--user); border-bottom: 1px solid var(--user-border); }
  .turn-card.role-assistant .turn-header { background: #1a2a1a; border-bottom: 1px solid var(--thought-border); }

  .role-label { font-weight: 700; font-size: 10px; padding: 2px 8px; border-radius: 3px; }
  .role-user .role-label { background: var(--user-border); color: white; }
  .role-assistant .role-label { background: var(--thought-border); color: white; }

  .turn-actions { display: flex; gap: 5px; align-items: center; margin-left: auto; }

  .turn-content { padding: 10px 12px; background: rgba(0,0,0,0.2); }

  .thought-block {
    background: var(--thought); border-left: 3px solid var(--thought-border);
    border-radius: 4px; padding: 8px 12px; margin-bottom: 6px;
    font-size: 13px; line-height: 1.6;
  }
  .thought-label { font-family: 'Inconsolata', monospace; font-size: 10px; color: var(--thought-border); font-weight: 700; margin-bottom: 4px; }

  .action-block {
    background: var(--action); border-left: 3px solid var(--action-border);
    border-radius: 4px; padding: 8px 12px;
    font-family: 'Inconsolata', monospace; font-size: 13px;
  }
  .action-label { font-size: 10px; color: var(--action-border); font-weight: 700; margin-bottom: 4px; }

  .user-content { font-size: 13px; line-height: 1.6; color: #bbb; }

  textarea {
    width: 100%; background: rgba(0,0,0,0.3); border: 1px solid #333;
    border-radius: 4px; color: var(--text);
    font-family: 'Inconsolata', monospace; font-size: 12px;
    padding: 8px; resize: vertical; min-height: 60px; line-height: 1.6;
  }
  textarea:focus { outline: none; border-color: var(--accent); }

  .add-turn-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 8px; background: rgba(255,255,255,0.03);
    border: 1px dashed #333; border-radius: 6px; color: var(--text-dim);
    cursor: pointer; font-size: 12px; margin-top: 4px; transition: all 0.15s;
  }
  .add-turn-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(233,69,96,0.05); }

  /* ステータスバー */
  .statusbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid #2a2a4a;
    padding: 5px 20px; font-size: 11px; color: var(--text-dim);
    font-family: 'Inconsolata', monospace; display: flex; gap: 20px; z-index: 50;
  }
  .statusbar span { color: var(--accent2); }

  /* モーダル */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid #333; border-radius: 8px; padding: 22px; max-width: 460px; width: 90%; }
  .modal h3 { margin-bottom: 14px; font-size: 15px; }
  .modal select, .modal input {
    width: 100%; background: rgba(0,0,0,0.3); border: 1px solid #333;
    border-radius: 4px; color: var(--text); padding: 7px; font-size: 13px;
    margin-bottom: 10px; font-family: 'Zen Kaku Gothic New', sans-serif;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }

  input[type="file"] { display: none; }

  .empty-state { text-align: center; padding: 80px 40px; color: var(--text-dim); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #555; }
</style>
</head>
<body>

<header>
  <div>
    <h1>⚡ PERRY SFT EDITOR</h1>
    <div class="subtitle">ALFWorld trajectory editor</div>
  </div>
  <div class="spacer"></div>
  <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">📂 読み込む</button>
  <button class="btn btn-success" onclick="exportJSONL()">💾 エクスポート</button>
  <input type="file" id="fileInput" accept=".jsonl,.json" onchange="loadFile(event)">
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      軌跡一覧
      <span class="count-badge" id="trajCount">0</span>
    </div>

    <!-- フィルターバー -->
    <div class="filter-bar">
      <label>FILTER BY TAG</label>
      <select id="filterSelect" onchange="applyFilter()">
        <option value="all">すべて表示</option>
        <option value="pick_and_place">pick_and_place</option>
        <option value="pick_two">pick_two</option>
        <option value="clean_and_place">clean_and_place</option>
        <option value="heat_and_place">heat_and_place</option>
        <option value="cool_and_place">cool_and_place</option>
        <option value="examine">examine</option>
        <option value="db">DB Bench</option>
        <option value="custom">カスタムタグ</option>
        <option value="untagged">タグなし</option>
      </select>
    </div>

    <button class="new-traj-btn" onclick="newTrajectory()">＋ 新規軌跡を作成</button>
    <div class="traj-list" id="trajList"></div>
  </div>

  <div class="main" id="mainArea">
    <div class="dropzone" id="dropzone"
         ondragover="handleDragOver(event)"
         ondragleave="handleDragLeave(event)"
         ondrop="handleDrop(event)"
         onclick="document.getElementById('fileInput').click()">
      <div class="icon">📋</div>
      <h2>JSONLファイルをドロップ</h2>
      <p>またはクリックしてファイルを選択</p>
      <p style="margin-top:8px; font-size:11px; color:#555;">ALFWorld / DBBench の SFTデータ（.jsonl）に対応</p>
    </div>
  </div>
</div>

<div class="statusbar">
  <div>総数: <span id="statTotal">0</span></div>
  <div>表示中: <span id="statVisible">0</span></div>
  <div>選択中: <span id="statCurrent">—</span></div>
  <div>ターン数: <span id="statTurns">—</span></div>
  <div id="statMsg" style="color: #52b788;"></div>
</div>

<!-- ターン追加モーダル -->
<div class="modal-overlay" id="addTurnModal">
  <div class="modal">
    <h3>ターンを追加</h3>
    <select id="newTurnRole">
      <option value="user">user（環境からの観察）</option>
      <option value="assistant">assistant（THOUGHT + ACTION）</option>
    </select>
    <textarea id="newTurnContent" placeholder="内容を入力...&#10;&#10;assistantの場合:&#10;THOUGHT: [思考内容]&#10;ACTION: [行動]" style="min-height:120px;"></textarea>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="confirmAddTurn()">追加</button>
    </div>
  </div>
</div>

<script>
let trajectories = [];
let currentIndex = -1;
let insertAfterIndex = -1;

const TASK_KEYWORDS = {
  pick_and_place: ['put a ', 'put the ', 'place a ', 'place the '],
  pick_two: ['put two', 'place two', 'find two'],
  clean_and_place: ['clean', 'wash', 'rinse'],
  heat_and_place: ['heat', 'warm', 'cook', 'microwave'],
  cool_and_place: ['cool', 'chill', 'refrigerat', 'fridge'],
  examine: ['examine', 'look at', 'inspect', 'find and'],
};

const DB_KEYWORDS = ['SELECT', 'INSERT', 'UPDATE', 'DELETE', 'WHERE', 'mysql', 'database', 'table'];

function autoDetectTag(messages) {
  const taskMsg = messages.find(m => m.role === 'user' && m.content.length > 30 && !m.content.includes('I will ask'));
  if (!taskMsg) return null;
  const content = taskMsg.content.toLowerCase();

  // DB判定
  if (DB_KEYWORDS.some(k => taskMsg.content.includes(k))) return 'db';

  // ALFWorld判定
  for (const [tag, keywords] of Object.entries(TASK_KEYWORDS)) {
    if (keywords.some(k => content.includes(k))) return tag;
  }
  return null;
}

// ===== ファイル読み込み =====
function loadFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => parseJSONL(e.target.result);
  reader.readAsText(file);
  event.target.value = '';
}

function parseJSONL(text) {
  trajectories = [];
  const lines = text.trim().split('\n');
  for (const line of lines) {
    if (!line.trim()) continue;
    try {
      const obj = JSON.parse(line);
      let messages = [];
      if (obj.messages) messages = obj.messages;
      else if (obj.conversations) {
        messages = obj.conversations.map(c => ({
          role: c.from === 'human' ? 'user' : 'assistant',
          content: c.value
        }));
      }
      const autoTag = autoDetectTag(messages);
      trajectories.push({ messages, tag: autoTag, customTag: '', _meta: obj });
    } catch(e) { console.warn('Parse error:', line); }
  }
  renderSidebar();
  applyFilter();
  setMsg(`✓ ${trajectories.length}件の軌跡を読み込みました（自動タグ付け済み）`);
  if (trajectories.length > 0) selectTrajectory(0);
}

// ===== フィルタリング =====
function applyFilter() {
  const filterVal = document.getElementById('filterSelect').value;
  let visibleCount = 0;
  document.querySelectorAll('.trajectory-item').forEach((el, i) => {
    const traj = trajectories[i];
    if (!traj) return;
    let show = false;
    if (filterVal === 'all') {
      show = true;
    } else if (filterVal === 'untagged') {
      show = !traj.tag && !traj.customTag;
    } else if (filterVal === 'custom') {
      show = !!traj.customTag;
    } else {
      show = traj.tag === filterVal || traj.customTag === filterVal;
    }
    el.classList.toggle('hidden', !show);
    if (show) visibleCount++;
  });
  document.getElementById('statVisible').textContent = visibleCount;
}

// ===== サイドバー =====
function renderSidebar() {
  document.getElementById('trajCount').textContent = trajectories.length;
  document.getElementById('statTotal').textContent = trajectories.length;
  const list = document.getElementById('trajList');
  list.innerHTML = '';
  trajectories.forEach((traj, i) => {
    const div = document.createElement('div');
    div.className = 'trajectory-item' + (i === currentIndex ? ' active' : '');
    div.onclick = () => selectTrajectory(i);
    const firstTask = traj.messages.find(m => m.role === 'user' && m.content.length > 30 && !m.content.includes('I will ask'));
    const preview = firstTask ? firstTask.content.slice(0, 45) : '(空)';
    const displayTag = traj.customTag || traj.tag;
    const tagHtml = displayTag ? `<span class="tag tag-${displayTag}">${displayTag}</span>` : '<span style="color:#444; font-size:10px;">untagged</span>';
    div.innerHTML = `
      <div class="traj-index">#${i+1} ${tagHtml}</div>
      <div class="traj-preview">${escHtml(preview)}</div>
      <div class="traj-turns">${traj.messages.length} ターン</div>
    `;
    list.appendChild(div);
  });
  applyFilter();
}

// ===== 軌跡選択 =====
function selectTrajectory(index) {
  currentIndex = index;
  renderSidebar();
  renderEditor();
  document.getElementById('statCurrent').textContent = `#${index+1}`;
  document.getElementById('statTurns').textContent = trajectories[index].messages.length;
}

// ===== エディタ =====
function renderEditor() {
  if (currentIndex < 0) return;
  const traj = trajectories[currentIndex];
  const main = document.getElementById('mainArea');
  const displayTag = traj.customTag || traj.tag || '';

  let html = `
    <div class="editor-header">
      <h2>軌跡 #${currentIndex+1}</h2>
      <div class="spacer"></div>
      <button class="btn btn-secondary btn-sm" onclick="duplicateTrajectory(${currentIndex})">📋 複製</button>
      <button class="btn btn-danger btn-sm" onclick="deleteTrajectory(${currentIndex})">🗑 削除</button>
    </div>

    <div class="tag-area">
      <span class="tag-area-label">TAG:</span>
      ${displayTag ? `<span class="tag tag-${displayTag}">${displayTag}</span>` : ''}
      <select class="tag-select" onchange="updateTag(${currentIndex}, this.value)">
        <option value="">── タグを変更 ──</option>
        <option value="pick_and_place">pick_and_place</option>
        <option value="pick_two">pick_two</option>
        <option value="clean_and_place">clean_and_place</option>
        <option value="heat_and_place">heat_and_place</option>
        <option value="cool_and_place">cool_and_place</option>
        <option value="examine">examine</option>
        <option value="db">DB Bench</option>
      </select>
      <input type="text" placeholder="カスタムタグ..."
        style="background:rgba(0,0,0,0.3);border:1px solid #333;border-radius:4px;color:var(--text);padding:3px 8px;font-size:11px;width:120px;"
        value="${escHtml(traj.customTag || '')}"
        onchange="updateCustomTag(${currentIndex}, this.value)">
    </div>
  `;

  traj.messages.forEach((msg, i) => {
    html += renderTurnCard(msg, i);
  });

  html += `<button class="add-turn-btn" onclick="openAddTurnModal(${traj.messages.length - 1})">＋ ターンを末尾に追加</button>`;
  main.innerHTML = html;
}

function renderTurnCard(msg, index) {
  const roleClass = msg.role === 'user' ? 'role-user' : 'role-assistant';
  const roleLabel = msg.role === 'user' ? 'USER' : 'ASSISTANT';

  let viewHtml = '';
  if (msg.role === 'assistant') {
    const { thought, action } = parseAssistantContent(msg.content);
    if (thought) viewHtml += `<div class="thought-block"><div class="thought-label">THOUGHT</div>${escHtml(thought)}</div>`;
    if (action) viewHtml += `<div class="action-block"><div class="action-label">ACTION</div>${escHtml(action)}</div>`;
    if (!thought && !action) viewHtml += `<div class="user-content">${escHtml(msg.content)}</div>`;
  } else {
    viewHtml += `<div class="user-content">${escHtml(msg.content)}</div>`;
  }

  return `
    <div class="turn-card ${roleClass}" id="turn-${index}">
      <div class="turn-header">
        <span class="role-label">${roleLabel}</span>
        <span style="color:#444; font-size:10px;">turn ${index+1}</span>
        <div class="turn-actions">
          <button class="btn btn-secondary btn-sm" onclick="toggleEdit(${index})">✏</button>
          <button class="btn btn-secondary btn-sm" onclick="openAddTurnModal(${index})">＋</button>
          <button class="btn btn-danger btn-sm" onclick="deleteTurn(${currentIndex}, ${index})">✕</button>
        </div>
      </div>
      <div class="turn-content" id="turn-content-${index}" data-mode="view">
        <div class="view-part">${viewHtml}</div>
        <textarea style="display:none;" onchange="updateTurnContent(${currentIndex}, ${index}, this.value)">${escHtml(msg.content)}</textarea>
      </div>
    </div>
  `;
}

function parseAssistantContent(content) {
  const tMatch = content.match(/(?:THOUGHT:|Think:)\s*([\s\S]*?)(?=\n\s*(?:ACTION:|Act:)|$)/i);
  const aMatch = content.match(/(?:ACTION:|Act:)\s*([\s\S]*)$/i);
  return {
    thought: tMatch ? tMatch[1].trim() : null,
    action: aMatch ? aMatch[1].trim() : null
  };
}

function toggleEdit(turnIndex) {
  const container = document.getElementById(`turn-content-${turnIndex}`);
  const isView = container.dataset.mode === 'view';
  const viewPart = container.querySelector('.view-part');
  const ta = container.querySelector('textarea');
  if (isView) {
    viewPart.style.display = 'none';
    ta.style.display = 'block';
    ta.focus();
    container.dataset.mode = 'edit';
  } else {
    viewPart.style.display = 'block';
    ta.style.display = 'none';
    container.dataset.mode = 'view';
    selectTrajectory(currentIndex);
  }
}

function updateTurnContent(trajIndex, turnIndex, value) {
  trajectories[trajIndex].messages[turnIndex].content = value;
}

function updateTag(trajIndex, value) {
  if (!value) return;
  trajectories[trajIndex].tag = value;
  trajectories[trajIndex].customTag = '';
  renderSidebar();
  renderEditor();
  setMsg(`タグを "${value}" に変更しました`);
}

function updateCustomTag(trajIndex, value) {
  trajectories[trajIndex].customTag = value.trim();
  renderSidebar();
  setMsg(value ? `カスタムタグ "${value}" を設定しました` : 'タグをクリアしました');
}

function deleteTurn(trajIndex, turnIndex) {
  if (!confirm(`ターン ${turnIndex+1} を削除しますか？`)) return;
  trajectories[trajIndex].messages.splice(turnIndex, 1);
  selectTrajectory(currentIndex);
  setMsg('ターンを削除しました');
}

function openAddTurnModal(afterIndex) {
  insertAfterIndex = afterIndex;
  document.getElementById('newTurnContent').value = '';
  document.getElementById('addTurnModal').classList.add('open');
  setTimeout(() => document.getElementById('newTurnContent').focus(), 100);
}

function closeModal() { document.getElementById('addTurnModal').classList.remove('open'); }

function confirmAddTurn() {
  const role = document.getElementById('newTurnRole').value;
  const content = document.getElementById('newTurnContent').value.trim();
  if (!content) { alert('内容を入力してください'); return; }
  trajectories[currentIndex].messages.splice(insertAfterIndex + 1, 0, { role, content });
  closeModal();
  selectTrajectory(currentIndex);
  setMsg('ターンを追加しました');
}

function duplicateTrajectory(index) {
  const orig = trajectories[index];
  const copy = {
    messages: orig.messages.map(m => ({ ...m })),
    tag: orig.tag,
    customTag: orig.customTag ? orig.customTag + '_copy' : '',
    _meta: { ...orig._meta }
  };
  trajectories.splice(index + 1, 0, copy);
  renderSidebar();
  selectTrajectory(index + 1);
  setMsg(`✓ 軌跡 #${index+1} を複製しました → #${index+2}`);
}

function deleteTrajectory(index) {
  if (!confirm(`軌跡 #${index+1} を削除しますか？`)) return;
  trajectories.splice(index, 1);
  currentIndex = Math.min(index, trajectories.length - 1);
  renderSidebar();
  if (trajectories.length > 0) selectTrajectory(currentIndex);
  else document.getElementById('mainArea').innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>軌跡がありません</p></div>';
  setMsg('軌跡を削除しました');
}

function newTrajectory() {
  const newTraj = {
    messages: [
      { role: 'user', content: 'You are in the middle of a room. Looking quickly around you, you see ...\n\nYour task is to: ' },
      { role: 'assistant', content: 'THOUGHT: \nACTION: ' }
    ],
    tag: null, customTag: '', _meta: {}
  };
  trajectories.push(newTraj);
  renderSidebar();
  selectTrajectory(trajectories.length - 1);
  setMsg('新規軌跡を作成しました');
}

function exportJSONL() {
  const lines = trajectories.map(traj => {
    const obj = { messages: traj.messages };
    if (traj.customTag) obj._tag = traj.customTag;
    else if (traj.tag) obj._tag = traj.tag;
    return JSON.stringify(obj);
  });
  const blob = new Blob([lines.join('\n')], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `perry_sft_edited_${Date.now()}.jsonl`;
  a.click();
  URL.revokeObjectURL(url);
  setMsg(`✓ ${trajectories.length}件をエクスポートしました`);
}

function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('dragover'); }
function handleDragLeave(e) { e.currentTarget.classList.remove('dragover'); }
function handleDrop(e) {
  e.preventDefault(); e.currentTarget.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => parseJSONL(ev.target.result);
  reader.readAsText(file);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/\n/g, '<br>');
}

function setMsg(msg) {
  const el = document.getElementById('statMsg');
  el.textContent = msg;
  setTimeout(() => el.textContent = '', 3000);
}
</script>
